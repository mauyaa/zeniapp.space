<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="description" content="Zeni — Find rent and buy property across Kenya. Browse listings, schedule viewings, and message verified agents." />
    <meta property="og:title" content="Zeni — Where Kenya Lives" />
    <meta property="og:description" content="Find rent and buy property across Kenya. Browse listings, schedule viewings, and message verified agents." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- DNS prefetch for external domains the app connects to -->
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <!-- NON-BLOCKING FONT LOADING
         The media="print" + onload trick loads fonts asynchronously:
         browser skips them during initial render, then swaps them in once downloaded.
         The <noscript> fallback ensures fonts load if JS is disabled. -->
    <!-- Primary body font — preloaded for fastest swap -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <!-- Secondary fonts — loaded async, swap in when ready -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" />
    </noscript>
    <title>Zeni — Where Kenya Lives</title>
  </head>
  <body>
    <div id="root">
      <!-- Shown until React mounts; prevents white screen on reload. Matches ZeniLoading component. -->
      <div class="zeni-load-root" style="margin:0;padding:0;width:100%;height:100%;min-height:100vh;background:#fff;display:flex;justify-content:center;align-items:center;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;overflow:hidden" role="status" aria-live="polite" aria-label="Loading">
        <div style="position:relative;width:400px;height:400px;display:flex;justify-content:center;align-items:center">
          <div style="position:absolute;z-index:10;font-size:56px;font-weight:900;letter-spacing:-3px;color:#000;display:flex;align-items:baseline;background:#fff;padding:10px">ZENI<span style="color:#22c55e;font-size:64px;line-height:0;margin-left:2px">.</span></div>
          <div style="width:300px;height:300px;position:relative;z-index:1">
            <div style="width:6px;height:100px;position:absolute;left:30%;background:#22c55e;animation:zeni-move-h 2s infinite cubic-bezier(0.65,0.05,0.36,1);opacity:0.8"></div>
            <div style="width:6px;height:120px;position:absolute;top:40%;transform:rotate(90deg);background:#000;animation:zeni-move-v 2.5s infinite cubic-bezier(0.65,0.05,0.36,1);opacity:0.6"></div>
            <div style="position:absolute;top:15%;left:15%;width:24px;height:24px;background:#000;animation:zeni-rot 2s infinite cubic-bezier(0.65,0.05,0.36,1)"></div>
            <div style="position:absolute;bottom:20%;right:20%;width:20px;height:20px;border-radius:50%;background:#22c55e;animation:zeni-scale 1.5s infinite cubic-bezier(0.65,0.05,0.36,1)"></div>
          </div>
        </div>
      </div>
    </div>
    <style>
      @keyframes zeni-move-h { 0%{top:-50%;opacity:0} 30%{opacity:1} 70%{opacity:1} 100%{top:120%;opacity:0} }
      @keyframes zeni-move-v { 0%{left:-50%;opacity:0} 30%{opacity:1} 70%{opacity:1} 100%{left:120%;opacity:0} }
      @keyframes zeni-rot { 0%{transform:rotate(0deg)} 50%{transform:rotate(180deg)} 100%{transform:rotate(360deg)} }
      @keyframes zeni-scale { 0%{scale:1;opacity:0.5} 50%{scale:2.2;opacity:1} 100%{scale:1;opacity:0.5} }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
