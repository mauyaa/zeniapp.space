version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build: ./server
    depends_on:
      - mongo
    env_file:
      - ./server/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/zeni
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      args:
        VITE_API_BASE_URL: http://localhost:4000/api
        VITE_DEV_API_TARGET: http://localhost:4000
    depends_on:
      - api
    ports:
      - "4173:4173"

volumes:
  mongo-data:
