version: "3.8"
services:
  api:
    build: .
    ports:
      - "${PORT:-4000}:4000"
    environment:
      - PORT=4000
      - MONGO_URI=mongodb://mongo:27017/zeni
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5175}
    depends_on:
      - mongo
  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongo-data:/data/db
volumes:
  mongo-data:
